run_name: e1_gemma4_e2b_topk_sweep

target:    google/gemma-4-E2B-it
assistant: google/gemma-4-E2B-it-assistant

device: cuda
dtype: bfloat16
seed: 42

# Eval set composition. 500 prompts (vs E0's 200) for tighter recall CIs.
data:
  n_gsm8k: 250
  n_humaneval: 250          # HumanEval has only 164; the loader will cap.
  cache_dir: cache/eval

# E1a — top-K_max recall sweep.
# Capture top-K_max indices once per (prompt, position); derive recall@k
# in post-processing for every k in `k_values`. n_positions=64 doubles E0.
recall:
  enabled: true
  n_positions: 64
  K_max: 128
  k_values: [8, 16, 24, 32, 48, 64, 96, 128]
  greedy: true
  sampled: true
  temperature: 1.0
  max_prompts: null

# E1b — masked-embedder forward microbench at each top_k cell.
microbench:
  enabled: true
  ctx_len: 64
  iters: 100
  warmup: 20
  k_values: [8, 16, 24, 32, 48, 64, 96, 128]

# E1c — end-to-end spec-decode throughput at each top_k cell.
e2e_timing:
  enabled: true
  k_values: [8, 16, 32, 64, 128]   # subset; cells above 128 add little
  n_new_tokens: 256
  greedy: true
  sampled: false
  temperature: 1.0
  max_prompts: 100

output:
  root: runs/e1
  tensorboard: true

# Decision summary thresholds (NOT a hard kill — informational).
# - "easy_headroom": recall jumps to ≥ 0.95 at top_k=64 → buy more clusters.
# - "structural_problem": recall stays < 0.85 even at top_k=128 → joint
#   selection plausibly worth it (proceed to E2/E3).
decision:
  easy_headroom_recall_at_k64: 0.95
  structural_problem_recall_at_k128: 0.85
