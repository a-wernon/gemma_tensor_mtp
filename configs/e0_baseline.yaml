run_name: e0_gemma4_e2b_baseline

target:    google/gemma-4-E2B-it
assistant: google/gemma-4-E2B-it-assistant

device: cuda
dtype: bfloat16
seed: 42

# Eval set composition. ~200 prompts total, balanced across reasoning + code.
data:
  n_gsm8k: 100
  n_humaneval: 100
  cache_dir: cache/eval

# Cluster recall (E0a). n_positions = number of generated tokens per prompt
# we probe for cluster membership.
recall:
  n_positions: 32
  greedy: true            # measure recall against target argmax
  sampled: true           # measure recall against target sampled token
  temperature: 1.0
  max_prompts: null       # set to a small int for smoke runs

# End-to-end timing (E0b). Skip with --skip-timing if only recall is needed.
timing:
  enabled: true
  n_new_tokens: 256
  greedy: true
  sampled: false          # skip sampled timing in baseline run; enable later
  temperature: 1.0
  max_prompts: 50         # timing is slower per prompt; use a subset

output:
  root: runs/e0
  tensorboard: true

# Kill criterion (per pivot doc): if greedy_recall ≥ 0.99 AND
# sampled_recall ≥ 0.95, the cluster selector is saturated → STOP Gemma
# track and default back to EvaByte.
kill_criterion:
  greedy_recall_threshold: 0.99
  sampled_recall_threshold: 0.95
